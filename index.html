<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade 02</title>
</head>
<body>

    <h1>Questionário</h1>

    <form action="https://nic.ifrn.edu.br/aulas/atividade_02/" method="post">

        <p>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
        </p>

        <fieldset>
            <legend>resp_01 - Qual sua linguagem de programação favorita?</legend>

            <input type="radio" id="python" name="resp_01" value="Python">
            <label for="python">Python</label><br>

            <input type="radio" id="java" name="resp_01" value="Java">
            <label for="java">Java</label><br>

            <input type="radio" id="javascript" name="resp_01" value="JavaScript">
            <label for="javascript">JavaScript</label>
        </fieldset>

        <br>

        <fieldset>
            <legend>resp_02 - Qual sistema operacional você utiliza com mais frequência?</legend>

            <input type="radio" id="windows" name="resp_02" value="Windows">
            <label for="windows">Windows</label><br>

            <input type="radio" id="linux" name="resp_02" value="Linux">
            <label for="linux">Linux</label><br>

            <input type="radio" id="macos" name="resp_02" value="macOS">
            <label for="macos">macOS</label>
        </fieldset>

        <br>

        <button type="submit">Enviar</button>

    </form>

</body>
</html>
